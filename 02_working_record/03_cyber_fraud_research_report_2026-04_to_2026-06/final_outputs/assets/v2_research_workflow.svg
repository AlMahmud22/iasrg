<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520">
  <rect width="1180" height="520" fill="#ffffff"/>
  <style>
    .box{fill:#eef6ff;stroke:#2f5f8f;stroke-width:2;rx:12}
    .box2{fill:#f6f8fa;stroke:#6b7280;stroke-width:2;rx:12}
    .txt{font-family:Arial,sans-serif;font-size:22px;fill:#111827;font-weight:700}
    .sub{font-family:Arial,sans-serif;font-size:17px;fill:#374151}
    .arrow{stroke:#374151;stroke-width:3;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#374151"/>
    </marker>
  </defs>
  <text x="590" y="48" text-anchor="middle" class="txt">Secondary-Data and Framework-Development Workflow</text>
  <rect x="45" y="120" width="170" height="120" class="box"/>
  <text x="130" y="157" text-anchor="middle" class="txt">Source</text>
  <text x="130" y="185" text-anchor="middle" class="sub">Official reports</text>
  <text x="130" y="210" text-anchor="middle" class="sub">Academic papers</text>
  <rect x="270" y="120" width="170" height="120" class="box"/>
  <text x="355" y="157" text-anchor="middle" class="txt">Screening</text>
  <text x="355" y="185" text-anchor="middle" class="sub">Relevance</text>
  <text x="355" y="210" text-anchor="middle" class="sub">Reliability</text>
  <rect x="495" y="120" width="170" height="120" class="box"/>
  <text x="580" y="157" text-anchor="middle" class="txt">Extraction</text>
  <text x="580" y="185" text-anchor="middle" class="sub">Claims</text>
  <text x="580" y="210" text-anchor="middle" class="sub">Indicators</text>
  <rect x="720" y="120" width="170" height="120" class="box"/>
  <text x="805" y="157" text-anchor="middle" class="txt">Coding</text>
  <text x="805" y="185" text-anchor="middle" class="sub">Seven factors</text>
  <text x="805" y="210" text-anchor="middle" class="sub">Evidence strength</text>
  <rect x="945" y="120" width="190" height="120" class="box"/>
  <text x="1040" y="157" text-anchor="middle" class="txt">Framework</text>
  <text x="1040" y="185" text-anchor="middle" class="sub">Scenarios</text>
  <text x="1040" y="210" text-anchor="middle" class="sub">Modules</text>
  <path d="M215 180 H270" class="arrow"/>
  <path d="M440 180 H495" class="arrow"/>
  <path d="M665 180 H720" class="arrow"/>
  <path d="M890 180 H945" class="arrow"/>
  <rect x="185" y="320" width="260" height="95" class="box2"/>
  <text x="315" y="354" text-anchor="middle" class="txt">Descriptive Analysis</text>
  <text x="315" y="383" text-anchor="middle" class="sub">Trend, category and tool mapping</text>
  <rect x="735" y="320" width="260" height="95" class="box2"/>
  <text x="865" y="354" text-anchor="middle" class="txt">Validation Logic</text>
  <text x="865" y="383" text-anchor="middle" class="sub">Triangulation and traceability</text>
  <path d="M580 240 C580 292 420 292 350 320" class="arrow"/>
  <path d="M805 240 C805 292 825 292 850 320" class="arrow"/>
</svg>
